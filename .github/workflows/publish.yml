name: Publish

# Publishes both SDKs when a version tag is pushed (e.g. v0.3.0).
# Auth is OIDC trusted publishing — no PyPI or npm tokens are stored anywhere.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # allow manual publish of the current version from the Actions tab

jobs:
  pypi:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    environment: release        # matches the environment set on the PyPI trusted publisher
    permissions:
      id-token: write           # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        working-directory: ubag-python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ubag-python/dist/

  npm:
    name: Publish Node to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write           # required for npm OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Use an npm that supports OIDC trusted publishing
        run: npm install -g npm@latest   # OIDC publishing needs npm >= 11.5.1

      - name: Publish to npm
        working-directory: ubag-node
        run: npm publish
